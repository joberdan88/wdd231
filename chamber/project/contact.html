<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Rio Trails Guide</title>
    <meta name="description" content="Get in touch with the Rio Trails Guide team to suggest a trail, report a problem, or ask a question.">
    <meta name="author" content="Rio Trails Guide Team">
    
    <link rel="icon" href="images/favicon.png">
    
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">Rio Trails Guide</div>
        <button id="menu-button" aria-label="Toggle Menu">&#9776;</button>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="trails.html">Trails</a></li>
                <li><a href="tips.html">Tips</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Contact Us</h1>
            <p>Have a question or want to suggest a new trail? Use the form below to reach out.</p>
            
            <form action="thankyou.html" method="get">
                <div class="form-group">
                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" name="fname" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name:</label>
                    <input type="text" id="lname" name="lname" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <select id="subject" name="subject">
                        <option value="question">Question</option>
                        <option value="suggestion">Trail Suggestion</option>
                        <option value="report">Report a Problem</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Rio Trails Guide | Author: Rio Hiking Community</p>
        <p><a href="https://www.youtube.com" target="_blank">Video Demonstration</a></p>
        <p><a href="site-plan.html">Site Plan</a> | <a href="attributions.html">Attributions</a></p>
    </footer>

    <script src="scripts/main.js" type="module"></script>
</body>
</html>
